name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Run BIIIF
        run: |
          # 1. Install the package
          npm install biiif
          # 2. Ensure folder exists and clean up loose files
          mkdir -p iiif
          find ./iiif -maxdepth 1 -type f -delete
          # 3. Run using the absolute local path
          node ./node_modules/biiif/dist/index.js ./iiif --v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: iiif
          branch: gh-pages
