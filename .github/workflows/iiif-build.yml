name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Manifests
        run: |
          # 1. Install the tool
          npm install -g iiif-manifest-generator
          
          # 2. Run the generator on the iiif folder
          # This tool is smarter about images and won't throw the ENOTDIR error
          iiif-manifest-generator ./iiif https://alleghenydh.github.io/student_iiif_repository/
          
          # 3. Create public and move the results
          mkdir -p public
          cp -r ./iiif/* public/
          
          # 4. Diagnostic: Check if index.json exists
          ls -R public/webb

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
