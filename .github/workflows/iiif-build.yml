name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          npm install biiif
          
          # 1. VERIFY IMAGES EXIST (This will show up in your logs)
          echo "Listing all files in the repository:"
          find . -maxdepth 3 -not -path '*/.*'
          
          # 2. CREATE PUBLIC FOLDER
          mkdir -p public
          
          # 3. RUN BIIIF (Using the absolute binary path)
          ./node_modules/.bin/biiif ./iiif --out ./public --v2
          
          # 4. FINAL CHECK
          echo "What ended up in the public folder?"
          ls -R public

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
