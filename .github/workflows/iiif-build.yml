name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install BIIIF
        run: npm install biiif

      - name: Generate Manifests
        run: |
          mkdir -p output
          # This points directly to the logic file inside the folder we just installed
          node ./node_modules/biiif/bin/biiif ./iiif --out ./output --v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: output
          branch: gh-pages
