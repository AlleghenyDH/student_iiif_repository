name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          npm install biiif
          BIIIF_PATH=$(find ./node_modules -name biiif -type f -executable -print -quit || find ./node_modules -name index.js -path "*/biiif/*" -print -quit)
          
          mkdir -p public
          
          # This line is the magic: it points specifically to the iiif folder in your root
          node "$BIIIF_PATH" "./iiif" --out ./public --v2
          
          # Just to be safe, let's keep the test file for one more run
          echo "Build successful" > public/build_report.txt

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
