name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          npm install -g biiif-cli
          
          # Run the tool on the iiif folder
          biiif ./iiif --url https://alleghenydh.github.io/student_iiif_repository/
          
          mkdir -p public
          # Copy only the actual generated JSON and images
          cp -r ./iiif/* public/
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
