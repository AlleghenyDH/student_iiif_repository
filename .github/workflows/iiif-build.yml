name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Manual Manifest Generation
        run: |
          mkdir -p public/webb
          node -e "
          const fs = require('fs');
          const repoBase = 'https://alleghenydh.github.io/student_iiif_repository';
          
          const manifest = {
            '@context': 'http://iiif.io/api/presentation/2/context.json',
            '@id': \`\${repoBase}/webb/index.json\`,
            '@type': 'sc:Manifest',
            'label': 'Webb Union',
            'sequences': [
              {
                '@type': 'sc:Sequence',
                'canvases': [
                  {
                    '@id': \`\${repoBase}/webb/canvas/1\`,
                    '@type': 'sc:Canvas',
                    'width': 2000,
                    'height': 2000,
                    'label': 'p. 1',
                    'images': [
                      {
                        '@id': \`\${repoBase}/webb/annotation/1\`,
                        '@type': 'oa:Annotation',
                        'motivation': 'sc:painting',
                        'resource': {
                          '@id': \`\${repoBase}/webb/item/Webb_Union.jpg\`,
                          '@type': 'dctypes:Image',
                          'format': 'image/jpeg',
                          'width': 2000,
                          'height': 2000
                        },
                        'on': \`\${repoBase}/webb/canvas/1\`
                      }
                    ]
                  }
                ]
              }
            ]
          };

          fs.writeFileSync('public/webb/index.json', JSON.stringify(manifest, null, 2));
          "
          cp -r ./iiif/* public/
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
