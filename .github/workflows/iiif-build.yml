name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          # 1. Install CLI
          npm install -g biiif-cli
          
          # 2. Run biiif (No extra flags this time)
          biiif ./iiif --url https://alleghenydh.github.io/student_iiif_repository/
          
          # 3. Prepare the public folder
          mkdir -p public
          
          # 4. Copy the generated manifests and images to public
          # We include the 'webb' folder and the top-level index.json
          cp -r ./iiif/* public/
          
          # 5. Diagnostic: Let's see if the folder 'webb' contains a new .json file
          echo "Checking if index.json was created in webb folder:"
          ls -R public/webb

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
