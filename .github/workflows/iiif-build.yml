name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          # 1. Install the CLI version of the tool
          npm install -g biiif-cli
          
          # 2. Create the output folder
          mkdir -p public
          
          # 3. Run the CLI with your specific GitHub URL
          # Replace 'AlleghenyDH' and 'student_iiif_repository' if they are different in your actual URL
          biiif ./iiif -u https://alleghenydh.github.io/student_iiif_repository/ -v

          # 4. Move the results to public
          # Biiif usually puts a +tiles folder and index.json inside the source folder
          # This command moves everything generated into our deploy folder
          cp -r ./iiif/* public/
          
          # Final check: see if index.json actually exists now
          ls -R public

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
