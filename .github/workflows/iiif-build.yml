name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          # 1. Install the tool
          npm install biiif
          
          # 2. Create the output folder
          mkdir -p public
          
          # 3. Run the tool by pointing directly to its main file
          node ./node_modules/biiif/index.js ./iiif --out ./public --v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
