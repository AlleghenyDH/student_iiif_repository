name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate IIIF
        run: |
          # Ensure folder exists and clean up loose files
          mkdir -p iiif
          find ./iiif -maxdepth 1 -type f -delete
          # Run the tool directly without global installation
          npx biiif ./iiif --v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: iiif
          branch: gh-pages
