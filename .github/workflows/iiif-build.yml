name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Manual Manifest Generation
        run: |
          mkdir -p public/webb
          node -e "
          const fs = require('fs');
          const repoBase = 'https://alleghenydh.github.io/student_iiif_repository';
          
          const manifest = {
            '@context': 'http://iiif.io/api/presentation/3/context.json',
            'id': \`\${repoBase}/webb/index.json\`,
            'type': 'Manifest',
            'label': { 'en': [ 'Webb Union' ] },
            'metadata': [
              { 'label': { 'en': [ 'Title' ] }, 'value': { 'en': [ 'Webb Union' ] } }
            ],
            'items': [
              {
                'id': \`\${repoBase}/webb/canvas/p1\`,
                'type': 'Canvas',
                'height': 1000,
                'width': 1000,
                'items': [
                  {
                    'id': \`\${repoBase}/webb/page/p1\`,
                    'type': 'AnnotationPage',
                    'items': [
                      {
                        'id': \`\${repoBase}/webb/annotation/p0001-image\`,
                        'type': 'Annotation',
                        'motivation': 'painting',
                        'body': {
                          'id': \`\${repoBase}/webb/item/Webb_Union.jpg\`,
                          'type': 'Image',
                          'format': 'image/jpeg',
                          'height': 1000,
                          'width': 1000
                        },
                        'target': \`\${repoBase}/webb/canvas/p1\`
                      }
                    ]
                  }
                ]
              }
            ]
          };

          fs.writeFileSync('public/webb/index.json', JSON.stringify(manifest, null, 2));
          "
          # Copy images to public so they are hosted on the web server
          cp -r ./iiif/* public/
          # Create an empty .nojekyll file (this fixes many GitHub Pages loading issues)
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
