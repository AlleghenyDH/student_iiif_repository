name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          npm install biiif
          
          # This script manually triggers the build and handles the folder logic
          node -e "
          const { build } = require('biiif');
          const path = require('path');
          
          async function run() {
            try {
              // We target the individual manifest folder to avoid the root-level confusion
              await build('./iiif/webb', 'https://alleghenydh.github.io/student_iiif_repository/webb');
              console.log('Manifest built successfully');
            } catch (err) {
              console.error('Build failed:', err);
              process.exit(1);
            }
          }
          run();
          "
          
          mkdir -p public/webb
          # Copy the results to public for deployment
          cp -r ./iiif/webb/* public/webb/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
