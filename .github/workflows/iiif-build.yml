name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          # 1. Install a more modern IIIF tool
          npm install -g @iiif/utils
          
          # 2. Create the output folder
          mkdir -p public/webb
          
          # 3. Use a simple Node script to generate a valid IIIF v3 manifest
          # This bypasses the 'biiif' folder bug entirely
          node -e "
          const fs = require('fs');
          const manifest = {
            '@context': 'http://iiif.io/api/presentation/3/context.json',
            'id': 'https://alleghenydh.github.io/student_iiif_repository/webb/index.json',
            'type': 'Manifest',
            'label': { 'en': [ 'Webb Union' ] },
            'items': [
              {
                'id': 'https://alleghenydh.github.io/student_iiif_repository/webb/canvas/1',
                'type': 'Canvas',
                'items': [
                  {
                    'id': 'https://alleghenydh.github.io/student_iiif_repository/webb/page/1',
                    'type': 'AnnotationPage',
                    'items': [
                      {
                        'id': 'https://alleghenydh.github.io/student_iiif_repository/webb/anno/1',
                        'type': 'Annotation',
                        'motivation': 'painting',
                        'body': {
                          'id': 'https://raw.githubusercontent.com/AlleghenyDH/student_iiif_repository/main/iiif/webb/item/Webb_Union.jpg',
                          'type': 'Image',
                          'format': 'image/jpeg'
                        },
                        'target': 'https://alleghenydh.github.io/student_iiif_repository/webb/canvas/1'
                      }
                    ]
                  }
                ]
              }
            ]
          };
          fs.writeFileSync('public/webb/index.json', JSON.stringify(manifest, null, 2));
          "
          
          # Copy the image folder just in case Exhibit needs to browse it
          cp -r ./iiif/webb/* public/webb/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
