name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Manifests
        run: |
          mkdir -p public/webb
          node -e "
          const fs = require('fs');
          const path = require('path');

          const repoUrl = 'https://alleghenydh.github.io/student_iiif_repository';
          // We point to the image on the gh-pages branch where it will live
          const imageUrl = repoUrl + '/webb/item/Webb_Union.jpg';
          const manifestUrl = repoUrl + '/webb/index.json';

          const manifest = {
            '@context': 'http://iiif.io/api/presentation/3/context.json',
            'id': manifestUrl,
            'type': 'Manifest',
            'label': { 'en': [ 'Webb Union' ] },
            'items': [
              {
                'id': repoUrl + '/webb/canvas/1',
                'type': 'Canvas',
                'width': 2000,
                'height': 2000,
                'items': [
                  {
                    'id': repoUrl + '/webb/page/1',
                    'type': 'AnnotationPage',
                    'items': [
                      {
                        'id': repoUrl + '/webb/anno/1',
                        'type': 'Annotation',
                        'motivation': 'painting',
                        'body': {
                          'id': imageUrl,
                          'type': 'Image',
                          'format': 'image/jpeg',
                          'width': 2000,
                          'height': 2000
                        },
                        'target': repoUrl + '/webb/canvas/1'
                      }
                    ]
                  }
                ]
              }
            ]
          };

          fs.writeFileSync('public/webb/index.json', JSON.stringify(manifest, null, 2));
          console.log('Manifest written to public/webb/index.json');
          "
          
          # Move images from main to public so they are actually hosted
          cp -r ./iiif/* public/
          ls -R public

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
