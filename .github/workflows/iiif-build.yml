name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Manual Manifest Generation
        run: |
          mkdir -p public/webb
          node -e "
          const fs = require('fs');
          const repoBase = 'https://alleghenydh.github.io/student_iiif_repository';
          
          // WE USE THE RAW LINK FOR THE IMAGE - Exhibit handles these better
          const imageUrl = 'https://raw.githubusercontent.com/AlleghenyDH/student_iiif_repository/main/iiif/webb/item/Webb_Union.jpg';
          
          const manifest = {
            '@context': 'http://iiif.io/api/presentation/3/context.json',
            'id': \`\${repoBase}/webb/index.json\`,
            'type': 'Manifest',
            'label': { 'en': [ 'Webb Union' ] },
            'items': [
              {
                'id': \`\${repoBase}/webb/canvas/1\`,
                'type': 'Canvas',
                'height': 1500,
                'width': 2000,
                'items': [
                  {
                    'id': \`\${repoBase}/webb/page/1\`,
                    'type': 'AnnotationPage',
                    'items': [
                      {
                        'id': \`\${repoBase}/webb/annotation/1\`,
                        'type': 'Annotation',
                        'motivation': 'painting',
                        'body': {
                          'id': imageUrl,
                          'type': 'Image',
                          'format': 'image/jpeg',
                          'height': 1500,
                          'width': 2000
                        },
                        'target': \`\${repoBase}/webb/canvas/1\`
                      }
                    ]
                  }
                ]
              }
            ]
          };
          fs.writeFileSync('public/webb/index.json', JSON.stringify(manifest, null, 2));
          "
          # We don't even need to copy the image to public if we use the RAW link!
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
