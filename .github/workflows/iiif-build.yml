name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          # 1. Install the tool
          npm install biiif
          
          # 2. Find where the executable is hiding and save it as a variable
          BIIIF_PATH=$(find ./node_modules -name biiif -type f -executable -print -quit || find ./node_modules -name index.js -path "*/biiif/*" -print -quit)
          echo "Found biiif at: $BIIIF_PATH"
          
          # 3. Create output folder and run the tool
          mkdir -p output
          node "$BIIIF_PATH" ./iiif --out ./output --v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: output
          branch: gh-pages
