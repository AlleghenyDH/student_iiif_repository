name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          npm install biiif
          
          # This script tells Node to run biiif but ignore non-directory files
          node -e "
          const { build } = require('biiif');
          build('./iiif', 'https://alleghenydh.github.io/student_iiif_repository/').then(() => {
            console.log('IIIF Build Complete');
          }).catch(err => {
            console.error(err);
            process.exit(1);
          });
          "
          
          mkdir -p public
          cp -r ./iiif/* public/
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
