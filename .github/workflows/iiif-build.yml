name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cleanup and Build
        run: |
          # Ensure the directory exists
          mkdir -p iiif
          # Remove stray files that crash the tool (like .keep)
          find ./iiif -maxdepth 1 -type f -delete
          # Run biiif and show us everything it does
          npx biiif ./iiif --v2

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: iiif
          branch: gh-pages
