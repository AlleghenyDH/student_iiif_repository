name: Build IIIF Manifests
on: [push]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Generate
        run: |
          npm install biiif
          BIIIF_PATH=$(find ./node_modules -name biiif -type f -executable -print -quit || find ./node_modules -name index.js -path "*/biiif/*" -print -quit)
          
          mkdir -p public
          
          # DIAGNOSTIC: List what is inside iiif
          echo "Checking iiif folder contents:"
          ls -R iiif
          
          # Run the build
          node "$BIIIF_PATH" ./iiif --out ./public --v2
          
          # DIAGNOSTIC: Create a test file to FORCE the branch to save
          echo "This is a test" > public/connection_test.txt
          
          # Show us what ended up in public
          echo "Checking public folder contents:"
          ls -R public

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
